name: Release to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Validate release tag and package version
        id: release_version
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [[ "$REF_TYPE" != "tag" || ! "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release workflow must run from a vMAJOR.MINOR.PATCH tag."
            exit 1
          fi

          expected_version="${REF_NAME#v}"
          package_version="$(uv run python -c 'from na_tools import __version__; print(__version__)')"
          if [[ "$package_version" != "$expected_version" ]]; then
            echo "Package version $package_version does not match tag $REF_NAME."
            exit 1
          fi

          echo "version=$expected_version" >> "$GITHUB_OUTPUT"

      - name: Build project
        run: uv build

      - name: Build Linux executable
        env:
          EXPECTED_VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          uv run --with pyinstaller pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --name na-tools-linux-x86_64 \
            --distpath release \
            --paths src \
            src/na_tools/__main__.py
          chmod +x release/na-tools-linux-x86_64
          binary_version="$(release/na-tools-linux-x86_64 --version | sed -n '1s/^na-tools, version //p')"
          if [[ "$binary_version" != "$EXPECTED_VERSION" ]]; then
            echo "Binary version $binary_version does not match expected version $EXPECTED_VERSION."
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
            release/na-tools-linux-x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
